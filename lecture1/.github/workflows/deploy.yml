name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & Build my-react-app (portfolio)
        run: |
          npm ci
          npm run build
        working-directory: lecture1/my-react-app

      - name: Install & Build community
        run: |
          npm ci
          npm run build
        working-directory: lecture1/community

      - name: Prepare deployment folder
        run: |
          mkdir -p _deploy
          cp lecture1/index.html _deploy/index.html
          cp -r lecture1/my-react-app/dist _deploy/portfolio
          cp -r lecture1/community/dist _deploy/community

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_deploy'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
